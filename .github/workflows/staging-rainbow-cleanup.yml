name: Rainbow cleanup (staging)

on:
  workflow_run:
    workflows: ["Deploy to Staging"]
    types:
      - completed
  workflow_dispatch:
    inputs:
      deployment-identifier:
        description: "Deployment identifier"
        type: string
        required: true
  schedule:
    - cron: "0 4 * * *" # Nightly at 4am
  pull_request:
    branches:
      - main
      - feature/*
    types:
      - labeled
      - opened
      - reopened
      - synchronize

env:
  AWS_ACCOUNT_ID: ${{ vars.STAGING_AWS_ACCOUNT_ID }}
  AWS_REGION: ca-central-1
  LOAD_BALANCER_LISTENER_ARN: ${{ vars.STAGING_LOAD_BALANCER_LISTENER_ARN }}

permissions:
  id-token: write
  contents: read

jobs:
  cleanup-single-deployment-identifier:
    runs-on: ubuntu-latest
    if: ${{ github.event_name == 'workflow_run' || github.event_name == 'workflow_dispatch' }}
    steps:
      - name: Checkout
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2

      - name: Configure AWS credentials using OIDC
        uses: aws-actions/configure-aws-credentials@ececac1a45f3b08a01d2dd070d28d111c5fe6722 # v4.1.0
        with:
          # role-to-assume: arn:aws:iam::${{ env.AWS_ACCOUNT_ID }}:role/platform-forms-client-apply
          role-to-assume: arn:aws:iam::${{ env.AWS_ACCOUNT_ID }}:role/platform-forms-client-pr-review-env
          role-session-name: RainbowCleanup
          aws-region: ${{ env.AWS_REGION }}

      - name: Rainbow cleanup on workflow_run event
        if: ${{ github.event_name == 'workflow_run' && github.event.workflow_run.conclusion == 'failure' }}
        uses: ./.github/workflows/rainbow/cleanup
        with:
          deployment-identifier: ${{ github.event.workflow_run.head_sha }}
          load-balancer-listener-arn: ${{ env.LOAD_BALANCER_LISTENER_ARN }}

      - name: Rainbow cleanup on workflow_dispatch event
        if: ${{ github.event_name == 'workflow_dispatch' }}
        uses: ./.github/workflows/rainbow/cleanup
        with:
          deployment-identifier: ${{ inputs.deployment-identifier }}
          load-balancer-listener-arn: ${{ env.LOAD_BALANCER_LISTENER_ARN }}

  cleanup-multiple-deployment-identifier-1:
    runs-on: ubuntu-latest
    # if: ${{ github.event_name == 'schedule' }}
    outputs:
      ids: ${{ steps.find-rainbow-deployments-ids.outputs.ids }}
    steps:
      - name: Checkout
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2

      - name: Configure AWS credentials using OIDC
        uses: aws-actions/configure-aws-credentials@ececac1a45f3b08a01d2dd070d28d111c5fe6722 # v4.1.0
        with:
          # role-to-assume: arn:aws:iam::${{ env.AWS_ACCOUNT_ID }}:role/platform-forms-client-apply
          role-to-assume: arn:aws:iam::${{ env.AWS_ACCOUNT_ID }}:role/platform-forms-client-pr-review-env
          role-session-name: RainbowCleanup
          aws-region: ${{ env.AWS_REGION }}

      - name: Find rainbow deployments to clean up
        id: find-rainbow-deployments-ids
        run: |
          arnList=($(aws elbv2 describe-rules \
            --listener-arn ${{ env.LOAD_BALANCER_LISTENER_ARN }} \
            --no-paginate \
            --query "Rules[?Priority > '0' && contains(Actions[0].ForwardConfig.TargetGroups[0].TargetGroupArn, 'rainbow')].RuleArn" \
            | jq -r '.[]'))

          deploymentIds=$(aws elbv2 describe-tags \
            --resource-arns "${arnList[@]}" \
            | jq -r '[.TagDescriptions[].Tags[] | select(.Key == "Name") | .Value | sub("^rainbow-"; "")]')

          echo "ids=$deploymentIds" >> "$GITHUB_OUTPUT"

  cleanup-multiple-deployment-identifier-2:
    runs-on: ubuntu-latest
    needs: cleanup-multiple-deployment-identifier-1
    strategy:
      matrix:
        deployment-identifier: ${{ fromJSON(needs.cleanup-multiple-deployment-identifier-1.outputs.ids) }}
    steps:
      - name: Checkout
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2

      - name: Configure AWS credentials using OIDC
        uses: aws-actions/configure-aws-credentials@ececac1a45f3b08a01d2dd070d28d111c5fe6722 # v4.1.0
        with:
          # role-to-assume: arn:aws:iam::${{ env.AWS_ACCOUNT_ID }}:role/platform-forms-client-apply
          role-to-assume: arn:aws:iam::${{ env.AWS_ACCOUNT_ID }}:role/platform-forms-client-pr-review-env
          role-session-name: RainbowCleanup
          aws-region: ${{ env.AWS_REGION }}

      - name: Cleanup
        run: |
          echo ${{ matrix.deployment-identifier }}