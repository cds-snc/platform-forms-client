name: Rainbow cleanup (staging)

on:
  workflow_run:
    # workflows: ["Deploy to Staging"]
    workflows: ["CodeQL"]
    types:
      - completed
  workflow_dispatch:
    inputs:
      deployment-identifier:
        description: "Deployment identifier"
        type: string
        required: true

env:
  AWS_ACCOUNT_ID: ${{ vars.STAGING_AWS_ACCOUNT_ID }}
  AWS_REGION: ca-central-1
  FUNCTION_NAME: "forms-client-pr"
  IMAGE: pr_review
  REGISTRY: ${{ vars.STAGING_AWS_ACCOUNT_ID }}.dkr.ecr.ca-central-1.amazonaws.com
  ROLE_ARN: arn:aws:iam::${{ vars.STAGING_AWS_ACCOUNT_ID }}:role/forms-lambda-client
  COGNITO_APP_CLIENT_ID: ${{secrets.STAGING_COGNITO_APP_CLIENT_ID}}
  COGNITO_USER_POOL_ID: ${{ secrets.STAGING_COGNITO_USER_POOL_ID}}
  NEXT_SERVER_ACTIONS_ENCRYPTION_KEY: ${{ secrets.STAGING_NEXT_SERVER_ACTIONS_ENCRYPTION_KEY }}
  GITHUB_SHA: ${{ github.sha }}

permissions:
  id-token: write
  contents: read

jobs:
  cleanup:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2

      - name: Configure AWS credentials using OIDC
        uses: aws-actions/configure-aws-credentials@ececac1a45f3b08a01d2dd070d28d111c5fe6722 # v4.1.0
        with:
          role-to-assume: arn:aws:iam::${{ env.AWS_ACCOUNT_ID }}:role/platform-forms-client-pr-review-env
          role-session-name: PRReviewECRPush
          aws-region: ${{ env.AWS_REGION }}

      - name: Rainbow cleanup on workflow_run event
        if: ${{ github.event_name == 'workflow_run' }} && ${{ github.event.workflow_run.conclusion == 'failure' }}
        uses: ./.github/workflows/rainbow/cleanup
        with:
          deployment-identifier: ${{ github.event.workflow_run.head_sha }}
          load-balancer-listener-arn: ${{ vars.STAGING_LOAD_BALANCER_LISTENER_ARN }}

      - name: Rainbow cleanup on workflow_dispatch event
        if: ${{ github.event_name == 'workflow_dispatch' }}
        uses: ./.github/workflows/rainbow/cleanup
        with:
          deployment-identifier: ${{ inputs.deployment-identifier }}
          load-balancer-listener-arn: ${{ vars.STAGING_LOAD_BALANCER_LISTENER_ARN }}