name: Rainbow cleanup (staging)

on:
  workflow_run:
    workflows: ["Deploy to Staging"]
    types:
      - completed
  workflow_dispatch:
    inputs:
      deployment-identifier:
        description: "Deployment identifier"
        type: string
        required: true
  schedule:
    - cron: "0 4 * * *" # Nightly at 4am
  pull_request:
    branches:
      - main
      - feature/*
    types:
      - labeled
      - opened
      - reopened
      - synchronize

env:
  AWS_ACCOUNT_ID: ${{ vars.STAGING_AWS_ACCOUNT_ID }}
  AWS_REGION: ca-central-1
  LOAD_BALANCER_LISTENER_ARN: ${{ vars.STAGING_LOAD_BALANCER_LISTENER_ARN }}

permissions:
  id-token: write
  contents: read

jobs:
  cleanup:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2

      - name: Configure AWS credentials using OIDC
        uses: aws-actions/configure-aws-credentials@ececac1a45f3b08a01d2dd070d28d111c5fe6722 # v4.1.0
        with:
          role-to-assume: arn:aws:iam::${{ env.AWS_ACCOUNT_ID }}:role/platform-forms-client-pr-review-env
          role-session-name: PRReviewECRPush
          aws-region: ${{ env.AWS_REGION }}

      - name: Rainbow cleanup on workflow_run event
        if: ${{ github.event_name == 'workflow_run' && github.event.workflow_run.conclusion == 'failure' }}
        uses: ./.github/workflows/rainbow/cleanup
        with:
          deployment-identifier: ${{ github.event.workflow_run.head_sha }}
          load-balancer-listener-arn: ${{ env.LOAD_BALANCER_LISTENER_ARN }}

      - name: Rainbow cleanup on workflow_dispatch event
        if: ${{ github.event_name == 'workflow_dispatch' }}
        uses: ./.github/workflows/rainbow/cleanup
        with:
          deployment-identifier: ${{ inputs.deployment-identifier }}
          load-balancer-listener-arn: ${{ env.LOAD_BALANCER_LISTENER_ARN }}

      - name: Rainbow cleanup on schedule event part 1
        # if: ${{ github.event_name == 'schedule' }}
        id: find-old-rainbow-deployments
        run: |
          arnList=$(aws elbv2 describe-rules \
            --listener-arn ${{ env.LOAD_BALANCER_LISTENER_ARN }} \
            --no-paginate \
            --query "Rules[?Priority > '1' && contains(Actions[0].ForwardConfig.TargetGroups[0].TargetGroupArn, 'rainbow')].RuleArn" \
            | jq -r '. | join(",")')
          echo "arnList=$arnList" >> $GITHUB_ENV

      - name: Rainbow cleanup on schedule event part 2
        # if: ${{ github.event_name == 'schedule' }}
        run: |
          for arn in $(echo ${{ env.arnList }} | sed "s/,/ /g")
          do
            deploymentIdentifier=$(aws elbv2 describe-tags --resource-arns $arn | jq '.TagDescriptions[0].Tags[] | select(.Key == "Name") | .Value | sub("^rainbow-"; "")')
            
            uses: ./.github/workflows/rainbow/cleanup
            with:
              deployment-identifier: $deploymentIdentifier
              load-balancer-listener-arn: ${{ env.LOAD_BALANCER_LISTENER_ARN }}
          done